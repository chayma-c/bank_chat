# ══════════════════════════════════════════════════════════════════════════
# NGINX API GATEWAY — Configuration principale
# ══════════════════════════════════════════════════════════════════════════
# Architecture de routage :
#
# Frontend (Angular)     → http://localhost:4200
# API Gateway (Nginx)    → http://localhost
#   ├─ /api/             → Django Orchestrateur (port 8000)
#   ├─ /fraud/           → Fraud Service (port 8001)
#   ├─ /auth/            → Keycloak (port 8080)
#   └─ /health           → Health check endpoint
# ══════════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────────
# Configuration upstream — Définition des services backend
# ──────────────────────────────────────────────────────────────────────────

upstream orchestrateur_backend {
    server orchestrateur:8000;
    keepalive 32;
}

upstream fraud_backend {
    server fraud-service:8001;
    keepalive 16;
}

upstream keycloak_backend {
    server keycloak:8080;
    keepalive 16;
}

# ──────────────────────────────────────────────────────────────────────────
# Serveur principal
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Timeout configurations
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ══════════════════════════════════════════════════════════════════════
    # 🏥 HEALTH CHECK ENDPOINT
    # ══════════════════════════════════════════════════════════════════════
    location /health {
        access_log off;
        return 200 "OK - API Gateway is running\n";
        add_header Content-Type text/plain;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 🤖 DJANGO ORCHESTRATEUR — /api/*
    # ══════════════════════════════════════════════════════════════════════
    # Routes gérées :
    #   - /api/v1/chatbot/*           → Chatbot endpoints
    #   - /api/v1/auth/*              → Auth Django (si utilisé)
    #   - /api/admin/*                → Django Admin
    #   - /api/health                 → Health check orchestrateur
    # ══════════════════════════════════════════════════════════════════════
    
    location /api/ {
        # Préserver le préfixe /api/ dans la requête upstream
        proxy_pass http://orchestrateur_backend;
        
        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (si besoin pour chat en temps réel)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Désactiver le buffering pour le streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # CORS headers (optionnel, à activer si nécessaire)
        # add_header Access-Control-Allow-Origin * always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 🚨 FRAUD SERVICE — /fraud/*
    # ══════════════════════════════════════════════════════════════════════
    # Routes gérées :
    #   - /fraud/api/detect           → Détection de fraude
    #   - /fraud/api/analyze          → Analyse de transaction
    #   - /fraud/health               → Health check fraud service
    # ══════════════════════════════════════════════════════════════════════
    
    location /fraud/ {
        # Retirer le préfixe /fraud/ avant de transmettre
        rewrite ^/fraud/(.*) /$1 break;
        proxy_pass http://fraud_backend;
        
        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout spécifique (détection peut être longue)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 🔐 KEYCLOAK — /auth/*
    # ══════════════════════════════════════════════════════════════════════
    # Routes gérées :
    #   - /auth/realms/*              → Endpoints OAuth/OIDC
    #   - /auth/admin/*               → Admin console Keycloak
    #   - /auth/resources/*           → Resources statiques (CSS, JS, images)
    #   - /auth/js/*                  → JavaScript Keycloak
    # ══════════════════════════════════════════════════════════════════════
    
    location /auth/ {
        # IMPORTANT : Ne pas retirer le préfixe /auth/
        # Keycloak est configuré avec KC_HTTP_RELATIVE_PATH=/auth
        proxy_pass http://keycloak_backend;
        
        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Headers spécifiques Keycloak
        proxy_set_header X-Forwarded-Server $host;
        
        # Buffering (nécessaire pour admin console)
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Timeout (admin console peut être lent)
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 📦 STATIC RESOURCES KEYCLOAK — Fallback pour anciennes URLs
    # ══════════════════════════════════════════════════════════════════════
    # Gère les requêtes vers /resources/* qui devraient être /auth/resources/*
    # Utile pour la compatibilité avec d'anciennes pages en cache
    # ══════════════════════════════════════════════════════════════════════
    
    location /resources/ {
        # Rediriger vers /auth/resources/
        rewrite ^/resources/(.*)$ /auth/resources/$1 permanent;
    }

    # ══════════════════════════════════════════════════════════════════════
    # ❌ 404 HANDLER — Routes non trouvées
    # ══════════════════════════════════════════════════════════════════════
    
    location / {
        return 404 '{"error": "Route not found. Available routes: /api/, /fraud/, /auth/, /health"}';
        add_header Content-Type application/json;
    }
}