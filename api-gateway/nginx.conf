upstream django_backend {
    server orchestrateur:8000;
}

upstream fraud_backend {
    server fraud-service:8001;
}

upstream keycloak_backend {
    server keycloak:8080;
}

server {
    listen 80;
    server_name localhost;

    # ── Timeouts globaux ─────────────────────────────────────────────────────
    # fraud analysis peut prendre jusqu'à 2 minutes (LLM + Excel)
    proxy_connect_timeout       10s;
    proxy_read_timeout          130s;
    proxy_send_timeout          130s;

    # ── Headers transmis aux services ────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── CORS global ───────────────────────────────────────────────────────────
    add_header Access-Control-Allow-Origin  "http://localhost:4200" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Preflight OPTIONS — répondre directement sans proxy
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Route 1 : Chat + Conversations → Django ───────────────────────────────
    location /api/v1/chatbot/ {
        proxy_pass http://django_backend;

        # SSE streaming (chat/stream/) — ne pas bufferiser
        proxy_buffering     off;
        proxy_cache         off;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }

    # ── Route 2 : Fraud analysis → fraud-service ─────────────────────────────
    location /api/fraud/ {
        proxy_pass          http://fraud_backend/;
        proxy_read_timeout  130s;
    }

    # ── Route 3 : Keycloak auth ───────────────────────────────────────────────
    location /auth/ {
        proxy_pass          http://keycloak_backend/;
        proxy_read_timeout  30s;
    }

    # ── Health check global ───────────────────────────────────────────────────
    location /health {
        access_log  off;
        return 200  '{"gateway":"ok"}';
        add_header  Content-Type application/json;
    }

    # ── Rate limiting (optionnel — à activer en prod) ─────────────────────────
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # location /api/ {
    #     limit_req zone=api burst=10 nodelay;
    # }
}