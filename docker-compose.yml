version: '3.8'

services:

  # ══════════════════════════════════════════════════════════════════════════
  # 🗄️ BASE DE DONNÉES POSTGRESQL
  # ══════════════════════════════════════════════════════════════════════════
  db:
    image: postgres:16-alpine
    container_name: bank_chat_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 🔴 REDIS (Cache & Sessions)
  # ══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: bank_chat_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 🔐 KEYCLOAK (Authentification)
  # ══════════════════════════════════════════════════════════════════════════
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: bank_chat_keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./keycloak/themes/mytheme:/opt/keycloak/themes/mytheme
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    command: >
      start-dev 
      --import-realm 
      --spi-theme-cache-themes=false 
      --spi-theme-cache-templates=false 
      --spi-theme-static-max-age=-1
    depends_on:
      db:
        condition: service_healthy
    # ════════════════════════════════════════════════════════════════════════
    # HEALTH CHECK CORRIGÉ - Plus permissif et avec plus de temps
    # ════════════════════════════════════════════════════════════════════════
    healthcheck:
      # Option 1 : Utiliser curl (plus simple et fiable)
      test: ["CMD-SHELL", "curl -f http://localhost:8080/auth/health/ready || exit 1"]
      interval: 30s          # Vérifier toutes les 30s (au lieu de 15s)
      timeout: 10s           # Timeout de 10s
      retries: 10            # 10 tentatives (au lieu de 5)
      start_period: 120s     # 2 minutes de délai de démarrage (au lieu de 60s)
    
    # Option 2 : Health check encore plus permissif (si Option 1 échoue)
    # healthcheck:
    #   test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 120s
    
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 🚨 FRAUD SERVICE (Détection de fraude)
  # ══════════════════════════════════════════════════════════════════════════
  fraud-service:
    build:
      context: ./fraud-service
      dockerfile: Dockerfile
    container_name: bank_chat_fraud
    volumes:
      - ./backend/data:/app/data
    env_file:
      - backend/.env
    environment:
      FRAUD_SERVICE_PORT: "8001"
      FRAUD_DB_HOST: db
      FRAUD_DB_NAME: banking_data
      FRAUD_DB_USER: sql_user
      FRAUD_DB_PASSWORD: sql_password
      FRAUD_DB_PORT: "5432"
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 🤖 ORCHESTRATEUR DJANGO (Backend principal)
  # ══════════════════════════════════════════════════════════════════════════
  orchestrateur:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank_chat_orchestrateur
    volumes:
      - ./backend/data:/app/data
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_NAME: bank_orchestrateur
      DB_USER: orchestrateur_user
      DB_PASSWORD: orchestrateur_password
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      FRAUD_SERVICE_URL: http://fraud-service:8001
      KEYCLOAK_URL: http://keycloak:8080/auth
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started  # ← Changé de service_healthy à service_started
      fraud-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        echo '⏳ Waiting for PostgreSQL...' &&
        while ! nc -z db 5432; do sleep 1; done &&
        echo '✅ PostgreSQL is ready!' &&
        
        echo '⏳ Waiting for Redis...' &&
        while ! nc -z redis 6379; do sleep 1; done &&
        echo '✅ Redis is ready!' &&
        
        echo '🔄 Running migrations...' &&
        python manage.py migrate --noinput &&
        echo '✅ Migrations done!' &&
        
        (while true; do
          sleep 86400 &&
          echo '🗄️ Running nightly archive...' &&
          python manage.py archive_messages &&
          echo '✅ Archive done!'
        done) &
        
        echo '🚀 Starting Django server...' &&
        python manage.py runserver 0.0.0.0:8000
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 🌐 API GATEWAY (Nginx)
  # ══════════════════════════════════════════════════════════════════════════
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: bank_chat_gateway
    ports:
      - "80:80"
    depends_on:
      orchestrateur:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
      keycloak:
        condition: service_started  # ← Changé de service_healthy à service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - bank_network

  # ══════════════════════════════════════════════════════════════════════════
  # 💻 FRONTEND ANGULAR
  # ══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank_chat_frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bank_network

# ══════════════════════════════════════════════════════════════════════════
# 📦 VOLUMES
# ══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local

# ══════════════════════════════════════════════════════════════════════════
# 🌐 NETWORKS
# ══════════════════════════════════════════════════════════════════════════
networks:
  bank_network:
    driver: bridge