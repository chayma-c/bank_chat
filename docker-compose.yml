services:

  # ── Base de données PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bank_chat_db
    environment:
      POSTGRES_DB: ${DB_NAME:-bank_chat}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bank_chat_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Keycloak ───────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: bank_chat_keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-bank_chat}
      KC_DB_USERNAME: ${DB_USER:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - ./keycloak/themes/mytheme:/opt/keycloak/themes/mytheme
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    command: >
      start-dev
      --import-realm
      --spi-theme-cache-themes=false
      --spi-theme-cache-templates=false
      --spi-theme-static-max-age=-1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Service de détection de fraude ───────────────────────────────────────
  fraud-service:
    build:
      context: ./fraud-service
      dockerfile: Dockerfile
    container_name: bank_chat_fraud
    volumes:
      - ./backend/data:/app/data   # partage le même fichier Excel
    env_file:
      - backend/.env               # même LLM_PROVIDER, OLLAMA_BASE_URL
    environment:
      FRAUD_SERVICE_PORT: "8001"
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Chatbot Django ─────────────────────────────────────────────────────────
  chatbot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank_chat_backend
    volumes:
      - ./backend/data:/app/data
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      FRAUD_SERVICE_URL: http://fraud-service:8001 
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      fraud-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        echo '⏳ Waiting for PostgreSQL...' &&
        while ! nc -z db 5432; do sleep 1; done &&
        echo '✅ PostgreSQL is ready!' &&
        echo '⏳ Waiting for Redis...' &&
        while ! nc -z redis 6379; do sleep 1; done &&
        echo '✅ Redis is ready!' &&
        python manage.py migrate --noinput &&
        echo '✅ Migrations done!' &&
        (while true; do
          sleep 86400 &&
          echo '🗄️ Running nightly archive...' &&
          python manage.py archive_messages &&
          echo '✅ Archive done!'
        done) &
        python manage.py runserver 0.0.0.0:8000
      "
    restart: unless-stopped

  # ── Frontend Angular ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank_chat_frontend
    ports:
      - "4200:80"
    depends_on:
      - chatbot
      - keycloak
      - fraud-service
    restart: unless-stopped

volumes:
  postgres_data: